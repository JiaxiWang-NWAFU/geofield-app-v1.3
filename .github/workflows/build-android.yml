name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装 Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 安装 Android SDK
        uses: android-actions/setup-android@v3

      - name: 安装依赖
        run: npm install

      - name: 构建 Web 资源
        run: npm run build

      - name: 添加 Android 平台
        run: npx cap add android

      - name: 同步 Capacitor
        run: npx cap sync android

      - name: 构建 Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: field-survey-helper-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
